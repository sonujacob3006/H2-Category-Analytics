<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="H2 Analytics">
<meta name="theme-color" content="#0d3d1a">
<title>Hyper 2 · Category Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gd:#0d3d1a;--gm:#1b6b30;--gl:#2e9e4f;--gp:#e8f5ec;--gp2:#d4eeda;
  --gold:#c9a23a;--goldl:#f0d078;--goldp:#fdf6e3;
  --w:#fff;--ow:#f5f7f5;--card:#fff;
  --td:#1a2e1d;--tm:#3d5c42;--tl:#6b9070;--tll:#a8c4ac;
  --br:#dde8de;--br2:#eef4ef;
  --green:#1b7a3a;--green-bg:#e6f9ed;
  --amber:#b07a00;--amber-bg:#fff8e6;
  --red:#c0392b;--red-bg:#fff0ee;
  --r:14px;--rs:10px;--sh:0 1px 8px rgba(13,61,26,.09);--sh2:0 4px 20px rgba(13,61,26,.13);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--ow);color:var(--td);overflow-x:hidden;padding-bottom:70px}

/* HEADER */
.hdr{background:linear-gradient(160deg,#091f0d 0%,var(--gd) 45%,#1a4e25 100%);position:sticky;top:0;z-index:200;box-shadow:0 2px 24px rgba(0,0,0,.35)}
.hdr-top{padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hlogo{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--goldl));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 2px 8px rgba(201,162,58,.4)}
.hdr-title{color:#fff}
.hdr-title h1{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1.15}
.hdr-title p{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px;font-weight:300}
.hbadge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase}
.hbadge.monthly{background:rgba(201,162,58,.2);border:1px solid rgba(201,162,58,.4);color:var(--goldl)}
.hbadge.ytd{background:rgba(46,158,79,.2);border:1px solid rgba(46,158,79,.4);color:#7effa0}

/* MONTH BAR */
.month-bar{display:flex;gap:5px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none}
.month-bar::-webkit-scrollbar{display:none}
.mbtn{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.65);padding:5px 13px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s}
.mbtn.active{background:linear-gradient(135deg,var(--gold),var(--goldl));color:var(--gd);border-color:transparent;font-weight:700}
.mbtn.ytdbtn.active{background:linear-gradient(135deg,var(--gl),var(--gm));color:#fff}

/* STORE BAR */
.store-bar{display:flex;gap:5px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none;background:rgba(0,0,0,.15)}
.store-bar::-webkit-scrollbar{display:none}
.sbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);padding:4px 11px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s}
.sbtn.active{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.35);font-weight:700}

.goldbar{height:2px;background:linear-gradient(90deg,var(--gold),var(--goldl),var(--gold))}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--br);display:flex;z-index:150;padding-bottom:env(safe-area-inset-bottom,0)}
.bntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;transition:all .15s}
.bntab-ico{font-size:18px;line-height:1}
.bntab-lbl{font-size:9px;font-weight:500;color:var(--tl);margin-top:3px;letter-spacing:.2px}
.bntab.active .bntab-lbl{color:var(--gm);font-weight:700}
.bntab.active .bntab-ico{filter:none}

/* VIEWS */
.view{display:none;padding:12px 12px 16px;animation:fin .25s ease}
.view.active{display:block}
@keyframes fin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--br);margin-bottom:10px;overflow:hidden}
.card-hdr{background:linear-gradient(90deg,var(--gp),var(--w));padding:9px 13px;border-bottom:1px solid var(--br2);display:flex;align-items:center;gap:8px}
.card-ico{width:26px;height:26px;background:linear-gradient(135deg,var(--gold),var(--goldl));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.card-title{font-size:11px;font-weight:700;color:var(--gd);text-transform:uppercase;letter-spacing:.6px}
.drow{display:flex;align-items:center;padding:8px 13px;border-bottom:1px solid var(--br2)}
.drow:last-child{border-bottom:none}
.dlbl{font-size:11px;color:var(--tl);flex:1}
.dval{font-size:12px;font-weight:600;color:var(--td);text-align:right}

/* KPI STRIP */
.kstrip{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.kcard{background:var(--card);border-radius:var(--rs);padding:12px 13px 10px;box-shadow:var(--sh);border-left:3px solid var(--gold);position:relative;overflow:hidden}
.kcard.wide{grid-column:span 2;border-left-color:var(--gm);display:flex;align-items:center;gap:13px}
.kcard.wide .kico{font-size:26px;flex-shrink:0}
.klbl{font-size:9px;color:var(--tl);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kval{font-size:17px;font-weight:700;color:var(--gd);font-family:'Playfair Display',serif;line-height:1.1}
.kcard.wide .kval{font-size:20px}
.ksub{font-size:10px;color:var(--tl);margin-top:3px}
.kbadge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:12px;margin-top:4px}
.kbadge.pos{background:var(--green-bg);color:var(--green)}
.kbadge.neg{background:var(--red-bg);color:var(--red)}
.kbadge.amb{background:var(--amber-bg);color:var(--amber)}

/* SECTION TITLE */
.stitle{font-size:10px;font-weight:700;color:var(--tl);text-transform:uppercase;letter-spacing:.9px;margin:12px 0 7px;display:flex;align-items:center;gap:6px}
.stitle::after{content:'';flex:1;height:1px;background:var(--br)}

/* TREND CHART */
.trend-chart{padding:12px 13px}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:70px;margin-bottom:5px}
.cbar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.cbar-pct{font-size:8px;font-weight:600;color:var(--tl);text-align:center;min-height:12px}
.cbar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .3s}
.cbar-lbl{font-size:8px;color:var(--tll);text-align:center;margin-top:3px}
.chart-legend{display:flex;gap:10px;justify-content:center;margin-top:6px;font-size:9px;color:var(--tl)}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}

/* CATEGORY RAG TABLE */
.rag-section{margin-bottom:10px}
.rag-hdr{font-size:10px;font-weight:700;color:var(--td);background:var(--gp);padding:7px 13px;border-bottom:1px solid var(--br2);text-transform:uppercase;letter-spacing:.5px}
.rag-row{display:flex;align-items:center;padding:8px 13px;border-bottom:1px solid var(--br2);cursor:pointer;transition:background .15s}
.rag-row:last-child{border-bottom:none}
.rag-row:active{background:var(--br2)}
.rag-name{font-size:11px;color:var(--td);font-weight:500;flex:1}
.rag-sub{font-size:9px;color:var(--tl);margin-top:1px}
.rag-vals{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.rag-pct{font-size:12px;font-weight:700}
.rag-bgt{font-size:9px;color:var(--tl)}
.rag-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-left:8px}
.spark{display:flex;align-items:center;gap:2px;margin-top:3px}
.spark-bar{height:14px;min-width:4px;border-radius:2px;display:inline-block}

/* STORE RANKING */
.store-rank-row{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid var(--br2);cursor:pointer}
.store-rank-row:last-child{border-bottom:none}
.rank-num{width:22px;font-size:13px;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif;flex-shrink:0}
.rank-info{flex:1;margin:0 8px}
.rank-name{font-size:12px;font-weight:600;color:var(--gd)}
.rank-bar-wrap{margin-top:4px}
.rank-bar{height:5px;background:var(--br);border-radius:3px;overflow:hidden}
.rank-fill{height:100%;border-radius:3px}
.rank-vals{text-align:right;min-width:80px}
.rank-sales{font-size:12px;font-weight:700;color:var(--td)}
.rank-badges{display:flex;gap:4px;justify-content:flex-end;margin-top:3px}
.rbadge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px}
.rbadge.pos{background:var(--green-bg);color:var(--green)}
.rbadge.neg{background:var(--red-bg);color:var(--red)}
.rbadge.amb{background:var(--amber-bg);color:var(--amber)}

/* INSIGHTS */
.insight-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--br);padding:13px;margin-bottom:9px;display:flex;gap:10px}
.ins-ico{font-size:22px;flex-shrink:0;line-height:1}
.ins-title{font-size:12px;font-weight:700;color:var(--gd);margin-bottom:3px}
.ins-body{font-size:11px;color:var(--tm);line-height:1.5}
.ins-stores{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.ins-chip{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:500}

/* STORE DETAIL OVERLAY */
.overlay{position:fixed;inset:0;background:var(--ow);z-index:300;overflow-y:auto;display:none}
.overlay.open{display:block}
.ov-hdr{background:linear-gradient(135deg,var(--gd),#1a5e2a);padding:13px 15px 16px;position:sticky;top:0}
.ov-back{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.8);font-size:11px;padding:5px 12px;border-radius:20px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.ov-name{font-family:'Playfair Display',serif;font-size:19px;color:#fff;font-weight:700}
.ov-meta{color:rgba(255,255,255,.55);font-size:10px;margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.ov-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px}
.ov-kpi{background:rgba(255,255,255,.1);border-radius:9px;padding:9px 6px 7px;text-align:center;border:1px solid rgba(255,255,255,.12)}
.ov-kv{color:var(--goldl);font-size:13px;font-weight:700;font-family:'Playfair Display',serif;line-height:1.1}
.ov-kl{color:rgba(255,255,255,.5);font-size:8px;margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.ov-kt{font-size:9px;margin-top:2px}
.ov-kt.pos{color:#7effa0}.ov-kt.neg{color:#ffaaaa}.ov-kt.amb{color:var(--goldl)}

/* BIG TREND CHART */
.big-chart{padding:14px 13px}
.bc-bars{display:flex;align-items:flex-end;gap:5px;height:90px;margin-bottom:6px}
.bc-bar-g{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px}
.bc-pct{font-size:8px;font-weight:700;text-align:center;min-height:13px}
.bc-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .35s}
.bc-lbl{font-size:8px;color:var(--tll);margin-top:3px;text-align:center}

/* CAT DETAIL IN OVERLAY */
.cat-section{padding:0 12px 16px}
.cs-div{font-size:10px;font-weight:700;color:var(--gm);text-transform:uppercase;letter-spacing:.7px;padding:10px 0 5px;border-bottom:1px solid var(--gp2);margin-bottom:4px}
.cs-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--br2)}
.cs-row:last-child{border-bottom:none}
.cs-name{font-size:11px;color:var(--td);flex:1;font-weight:500}
.cs-sales{font-size:11px;font-weight:600;color:var(--td);text-align:right;margin-right:8px;min-width:75px}
.cs-pct{font-size:11px;font-weight:700;text-align:right;min-width:50px}

/* BUDGET GAUGE */
.bgt-bar-wrap{padding:10px 13px 12px}
.bgt-track{height:10px;background:var(--br);border-radius:5px;overflow:hidden;margin:5px 0}
.bgt-fill{height:100%;border-radius:5px;transition:width .4s}
.bgt-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--tl)}
.bgt-summary{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.bgt-s-item{text-align:center}
.bgt-s-val{font-size:13px;font-weight:700;color:var(--td);font-family:'Playfair Display',serif}
.bgt-s-lbl{font-size:9px;color:var(--tl);margin-top:1px}

/* SEARCH / FILTER */
.search-bar{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:6px 14px;color:#fff;font-size:11px;font-family:'DM Sans',sans-serif;width:100%;outline:none;margin:0 14px 8px;width:calc(100% - 28px)}
.search-bar::placeholder{color:rgba(255,255,255,.4)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--tl);font-size:13px}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
</style>
</head>

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const f0 = n => n == null ? '—' : Math.round(n).toLocaleString('en-QA');
const f2 = n => n == null ? '—' : n.toFixed(2);
const fm = n => n >= 1e6 ? `${(n/1e6).toFixed(2)}M` : n >= 1e3 ? `${(n/1e3).toFixed(0)}K` : Math.round(n).toString();
const pct = (a,b) => b ? ((a/b)-1)*100 : 0;
const tc = v => v >= 3 ? 'pos' : v >= -3 ? 'amb' : 'neg';
const ti = v => v >= 3 ? '▲' : v >= -3 ? '◆' : '▼';
const tf = v => v >= 3 ? '#1b7a3a' : v >= -3 ? '#b07a00' : '#c0392b';
const tcb = v => v >= 3 ? '#e6f9ed' : v >= -3 ? '#fff8e6' : '#fff0ee';

function getData(month, store) {
  if (month === 'YTD') {
    return YTDDATA['Jun'][store] || null;
  }
  return MDATA[month][store] || null;
}

function getMonthlyVsLY(store, cat) {
  // Returns array of vs LY % for each month
  return MONTHS.map(m => {
    const d = MDATA[m][store];
    if (!d) return null;
    if (cat === 'total') return pct(d.sales, d.ly);
    const c = d.cats[cat];
    return c ? pct(c.s, c.ly) : null;
  });
}

// ═══════════════════════════════════════════════════════════
// MONTH / STORE SELECTORS
// ═══════════════════════════════════════════════════════════
function setMonth(m) {
  CUR_MONTH = m;
  document.querySelectorAll('.mbtn').forEach((b,i) => b.classList.remove('active'));
  const idx = [...MONTHS, 'YTD'].indexOf(m);
  if (idx >= 0) document.querySelectorAll('.mbtn')[idx]?.classList.add('active');
  const badge = document.getElementById('hBadge');
  badge.textContent = m === 'YTD' ? 'YTD' : m;
  badge.className = 'hbadge ' + (m === 'YTD' ? 'ytd' : 'monthly');
  renderAll();
}

function setStore(s) {
  CUR_STORE = s;
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sbtn').forEach(b => { if(b.dataset.store===s) b.classList.add('active'); });
  renderAll();
}

function buildStoreBar() {
  const bar = document.getElementById('storeBar');
  bar.innerHTML = STORES.map(s => 
    `<button class="sbtn${s===CUR_STORE?' active':''}" data-store="${s}" onclick="setStore('${s}')">${STORE_SHORT[s]}</button>`
  ).join('');
}

// ═══════════════════════════════════════════════════════════
// SVG SPARKLINE
// ═══════════════════════════════════════════════════════════
function sparkline(vals, w=60, h=18) {
  const valid = vals.filter(v => v!=null);
  if (!valid.length) return '';
  const mn = Math.min(...valid, 0), mx = Math.max(...valid, 0);
  const range = mx - mn || 1;
  const pts = vals.map((v,i) => {
    const x = (i / (vals.length-1)) * w;
    const y = h - ((( v ?? mn) - mn) / range) * h;
    return `${x},${y}`;
  }).join(' ');
  const zeroY = h - ((-mn)/range)*h;
  const col = valid[valid.length-1] >= 3 ? '#1b7a3a' : valid[valid.length-1] >= -3 ? '#b07a00' : '#c0392b';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <line x1="0" y1="${zeroY}" x2="${w}" y2="${zeroY}" stroke="#dde8de" stroke-width="1"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="${(vals.length-1)/(vals.length-1)*w}" cy="${h-(((valid[valid.length-1]??mn)-mn)/range)*h}" r="2.5" fill="${col}"/>
  </svg>`;
}

// ═══════════════════════════════════════════════════════════
// TREND BARS (6 month bars)
// ═══════════════════════════════════════════════════════════
function trendBars(vals, labels, maxAbs) {
  const ma = maxAbs || Math.max(...vals.filter(v=>v!=null).map(Math.abs), 1);
  return vals.map((v,i) => {
    if (v == null) return `<div class="cbar-wrap"><div class="cbar-pct"></div><div class="cbar" style="height:3px;background:#dde8de"></div><div class="cbar-lbl">${labels[i]}</div></div>`;
    const h = Math.max(Math.abs(v) / ma * 62, 3);
    const col = v >= 3 ? '#1b7a3a' : v >= -3 ? '#c9a23a' : '#c0392b';
    const lbl = v >= 0 ? `+${v.toFixed(1)}` : v.toFixed(1);
    return `<div class="cbar-wrap"><div class="cbar-pct" style="color:${col};font-size:7px">${lbl}%</div><div class="cbar" style="height:${h}px;background:${col}"></div><div class="cbar-lbl">${labels[i]}</div></div>`;
  }).join('');
}

function renderInsights() {
  const d = getData(CUR_MONTH, 'Area');
  if (!d) return;

  const insights = [];

  // Growth deceleration
  const junTotal = pct(MDATA['Jun']['Area'].sales, MDATA['Jun']['Area'].ly);
  const mayTotal = pct(MDATA['May']['Area'].sales, MDATA['May']['Area'].ly);
  if (junTotal < mayTotal - 3) {
    insights.push({ico:'⚠️',title:'Growth Decelerating',color:'#fff8e6',border:'#c9a23a',
      body:`Area growth dropped from ${mayTotal.toFixed(1)}% in May to ${junTotal.toFixed(1)}% in June. June was also the first month below budget. Monitor closely in July.`,
      stores:[]});
  }

  // HHH collapse
  const hhhJun = pct(MDATA['Jun']['Area'].cats['HHH'].s, MDATA['Jun']['Area'].cats['HHH'].ly);
  if (hhhJun < -10) {
    const badStores = STORES.filter(s=>s!=='Area').filter(s => {
      const sd = MDATA['Jun'][s]; if(!sd) return false;
      return pct(sd.cats['HHH'].s, sd.cats['HHH'].ly) < -10;
    });
    insights.push({ico:'🔴',title:'HHH (Hardlines) Collapsing',color:'#fff0ee',border:'#c0392b',
      body:`Non-Food HHH is down ${hhhJun.toFixed(1)}% vs last year in June. This has been deteriorating since March. Investigate range, competition and shelf space allocation.`,
      stores:badStores});
  }

  // Fresh hero
  const freshJun = pct(MDATA['Jun']['Area'].cats['Fresh Total'].s, MDATA['Jun']['Area'].cats['Fresh Total'].ly);
  insights.push({ico:'🌿',title:'Fresh Food Is Your Growth Engine',color:'#e6f9ed',border:'#1b7a3a',
    body:`Fresh Food is up ${freshJun.toFixed(1)}% in June, consistently outperforming all divisions. F&V (+${pct(MDATA['Jun']['Area'].cats['F&V'].s,MDATA['Jun']['Area'].cats['F&V'].ly).toFixed(1)}%) and Poultry (+${pct(MDATA['Jun']['Area'].cats['Poultry'].s,MDATA['Jun']['Area'].cats['Poultry'].ly).toFixed(1)}%) are standouts. Consider expanding space allocation.`,
    stores:[]});

  // Grocery concern
  const grocJun = pct(MDATA['Jun']['Area'].cats['Grocery'].s, MDATA['Jun']['Area'].cats['Grocery'].ly);
  if (grocJun < 0) {
    const badStores = STORES.filter(s=>s!=='Area').filter(s => {
      const sd = MDATA['Jun'][s]; if(!sd) return false;
      return pct(sd.cats['Grocery'].s, sd.cats['Grocery'].ly) < 0;
    });
    insights.push({ico:'📉',title:'Grocery Turning Negative',color:'#fff0ee',border:'#c0392b',
      body:`Grocery — your largest FMCG sub-category at ~25% of sales — went negative in June at ${grocJun.toFixed(1)}% vs LY. ${badStores.length} stores are in decline. Requires range and pricing review.`,
      stores:badStores});
  }

  // Frozen winner
  const frozenJun = pct(MDATA['Jun']['Area'].cats['Frozen'].s, MDATA['Jun']['Area'].cats['Frozen'].ly);
  if (frozenJun > 5) {
    insights.push({ico:'❄️',title:'Frozen — Most Consistent FMCG Winner',color:'#e8f4ff',border:'#2980b9',
      body:`Frozen has grown every single month this year, averaging strong double-digit growth. Currently +${frozenJun.toFixed(1)}% in June. This category deserves increased focus and promotional investment.`,
      stores:[]});
  }

  // Khalifa South structural issue
  const khalifahJun = pct(MDATA['Jun']['Khalifa South'].sales, MDATA['Jun']['Khalifa South'].ly);
  if (khalifahJun < -5) {
    insights.push({ico:'🏪',title:'Khalifa South Needs Urgent Review',color:'#fff0ee',border:'#c0392b',
      body:`Khalifa South is down ${Math.abs(khalifahJun).toFixed(1)}% vs LY and ${Math.abs(pct(MDATA['Jun']['Khalifa South'].sales,MDATA['Jun']['Khalifa South'].budget)).toFixed(1)}% vs budget in June. FMCG is down ${Math.abs(pct(MDATA['Jun']['Khalifa South'].cats['FMCG Total'].s,MDATA['Jun']['Khalifa South'].cats['FMCG Total'].ly)).toFixed(1)}%. Grocery −27.3%. This requires a structured turnaround plan.`,
      stores:['Khalifa South']});
  }

  document.getElementById('v-insights').innerHTML = `
    <div class="stitle" style="margin-top:10px">AI-Generated Insights · Based on ${CUR_MONTH} Data</div>
    ${insights.map(ins => `
      <div class="insight-card" style="border-left:4px solid ${ins.border};background:${ins.color}">
        <div class="ins-ico">${ins.ico}</div>
        <div>
          <div class="ins-title">${ins.title}</div>
          <div class="ins-body">${ins.body}</div>
          ${ins.stores.length ? `<div class="ins-stores">${ins.stores.map(s=>`<span class="ins-chip" style="background:${ins.border}22;color:${ins.border}">${s}</span>`).join('')}</div>` : ''}
        </div>
      </div>`).join('')}
    
    <div class="stitle">Monthly Category Summary · Area</div>
    <div class="card">
      ${['FMCG Total','Fresh Total','NonFood Total','Grocery','Frozen','F&V','Butchery','HHH','Poultry'].map(cat => {
        const vals = getMonthlyVsLY('Area', cat);
        const cur = vals[vals.length-1];
        if (cur == null) return '';
        const spk = sparkline(vals, 70, 22);
        return `<div class="rag-row">
          <div style="flex:1"><div class="rag-name">${cat}</div><div style="margin-top:3px">${spk}</div></div>
          <div style="display:flex;gap:4px;align-items:center">
            ${vals.map((v,i)=>v!=null?`<span style="font-size:8px;color:${tf(v)};font-weight:600">${v.toFixed(1)>0?'+':''}${v.toFixed(1)}</span>`:'').join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function openStoreDetail(storeName) {
  const month = CUR_MONTH;
  const d = getData(month, storeName);
  if (!d) return;
  const vsLY  = pct(d.sales, d.ly);
  const vsBgt = pct(d.sales, d.budget);
  const fmcgD = d.cats['FMCG Total'];
  const frshD = d.cats['Fresh Total'];
  const nfD   = d.cats['NonFood Total'];
  const fmcgP = fmcgD ? pct(fmcgD.s, fmcgD.ly) : 0;
  const frshP = frshD ? pct(frshD.s, frshD.ly) : 0;
  const nfP   = nfD   ? pct(nfD.s,   nfD.ly)   : 0;
  const trendV= MONTHS.map(m=>{ const md=MDATA[m][storeName]; return md?pct(md.sales,md.ly):null; });
  const ma    = Math.max(...trendV.filter(v=>v!=null).map(Math.abs),1);

  document.getElementById('ovName').textContent = storeName;
  document.getElementById('ovMeta').innerHTML = `<span>📅 ${month}</span><span>💰 QAR ${fm(d.sales)}</span><span>📋 Budget: QAR ${fm(d.budget)}</span>`;
  document.getElementById('ovKpis').innerHTML = `
    <div class="ov-kpi"><div class="ov-kv">QAR ${fm(d.sales)}</div><div class="ov-kl">Sales</div><div class="ov-kt ${tc(vsLY)}">${ti(vsLY)} ${vsLY.toFixed(1)}% LY</div></div>
    <div class="ov-kpi"><div class="ov-kv" style="color:${tf(vsBgt)}">${vsBgt>=0?'+':''}${vsBgt.toFixed(1)}%</div><div class="ov-kl">vs Budget</div><div class="ov-kt ${tc(vsBgt)}">QAR ${fm(d.budget)}</div></div>
    <div class="ov-kpi"><div class="ov-kv">QAR ${fm(d.ly)}</div><div class="ov-kl">Last Year</div><div class="ov-kt ${tc(vsLY)}">Gap: ${(d.sales-d.ly)>=0?'+':''}QAR${fm(Math.abs(d.sales-d.ly))}</div></div>`;

  const catSection = (title, cats) => {
    const rows = cats.map(cat => {
      const c = d.cats[cat]; if (!c) return '';
      const v = pct(c.s, c.ly);
      const spk = sparkline(MONTHS.map(m=>{ const md=MDATA[m][storeName]; return md&&md.cats[cat]?pct(md.cats[cat].s,md.cats[cat].ly):null; }), 50, 16);
      return `<div class="cs-row">
        <div><div class="cs-name">${cat}</div><div style="margin-top:2px">${spk}</div></div>
        <div class="cs-sales">QAR ${fm(c.s)}</div>
        <div class="cs-pct" style="color:${tf(v)}">${ti(v)} ${v.toFixed(1)}%</div>
      </div>`;
    }).join('');
    return `<div class="cs-div">${title}</div>${rows}`;
  };

  document.getElementById('ovBody').innerHTML = `
    <div style="background:#fff;padding:12px 13px 10px;border-bottom:1px solid var(--br)">
      <div style="font-size:10px;font-weight:700;color:var(--tl);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Sales Trend vs LY · All Months</div>
      <div class="chart-bars" style="height:65px">${trendBars(trendV, MONTHS, ma)}</div>
    </div>
    <div class="cat-section">
      ${catSection('FMCG CATEGORIES', FMCG_CATS)}
      <div class="cs-row" style="background:var(--gp2)">
        <div><div class="cs-name" style="font-weight:700;color:var(--gd)">FMCG TOTAL</div></div>
        <div class="cs-sales" style="font-weight:700">QAR ${fm(fmcgD?.s||0)}</div>
        <div class="cs-pct" style="color:${tf(fmcgP)};font-size:13px">${ti(fmcgP)} ${fmcgP.toFixed(1)}%</div>
      </div>
      ${catSection('FRESH FOOD CATEGORIES', FRESH_CATS)}
      <div class="cs-row" style="background:var(--gp2)">
        <div><div class="cs-name" style="font-weight:700;color:var(--gd)">FRESH TOTAL</div></div>
        <div class="cs-sales" style="font-weight:700">QAR ${fm(frshD?.s||0)}</div>
        <div class="cs-pct" style="color:${tf(frshP)};font-size:13px">${ti(frshP)} ${frshP.toFixed(1)}%</div>
      </div>
      ${catSection('NON-FOOD CATEGORIES', NONFOOD_CATS)}
      <div class="cs-row" style="background:var(--gp2)">
        <div><div class="cs-name" style="font-weight:700;color:var(--gd)">NON-FOOD TOTAL</div></div>
        <div class="cs-sales" style="font-weight:700">QAR ${fm(nfD?.s||0)}</div>
        <div class="cs-pct" style="color:${tf(nfP)};font-size:13px">${ti(nfP)} ${nfP.toFixed(1)}%</div>
      </div>
    </div>
    <div style="height:80px"></div>`;

  document.getElementById('storeOverlay').classList.add('open');
  document.getElementById('storeOverlay').scrollTop = 0;
}

  VIEWS.forEach(v => document.getElementById('v-'+v).classList.remove('active'));
  document.getElementById('v-'+name).classList.add('active');
  document.querySelectorAll('.bntab').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderView(name);
}

function renderView(name) {
  if (name==='overview') renderOverview();
  else if (name==='categories') renderCategories();
  else if (name==='stores') renderStores();
  else if (name==='insights') renderInsights();
}

function renderAll() {
  const active = VIEWS.find(v => document.getElementById('v-'+v).classList.contains('active')) || 'overview';
  renderView(active);
}

// Init
buildStoreBar();
renderOverview();
</script>
</body>
